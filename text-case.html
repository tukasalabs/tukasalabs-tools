  <!-- =========================
       Layout
  ========================== -->

  <div class="page-layout">

    <!-- Left Ad -->

    <aside class="ad-space">

      <div class="ad-box">
        AD SPACE
      </div>

    </aside>

    <!-- =========================
         Main
    ========================== -->

    <main class="main-content">

      <section class="tool-container text-case-page">

        <h1>
          text-case
        </h1>

        <p class="tool-description">
          高機能テキスト変換ツール
        </p>

        <!-- =========================
             Input
        ========================== -->

        <label class="section-label">
          Input Text
        </label>

        <textarea
          id="inputText"
          placeholder="Type or paste your text..."
        ></textarea>

        <!-- =========================
             Buttons
        ========================== -->

        <div class="case-buttons">

          <button onclick="convertUppercase()">
            UPPERCASE
          </button>

          <button onclick="convertLowercase()">
            lowercase
          </button>

          <button onclick="convertCapitalize()">
            Capitalize
          </button>

          <button onclick="convertSentenceCase()">
            Sentence Case
          </button>

          <button onclick="convertAlternating()">
            aLtErNaTiNg
          </button>

          <button onclick="removeExtraSpaces()">
            Remove Spaces
          </button>

          <button onclick="reverseText()">
            Reverse
          </button>

          <button onclick="clearText()">
            Clear
          </button>

        </div>

        <!-- =========================
             Output
        ========================== -->

        <label class="section-label">
          Output
        </label>

        <textarea
          id="outputText"
          readonly
        ></textarea>

        <!-- =========================
             Actions
        ========================== -->

        <div class="action-buttons">

          <button onclick="copyOutput()">
            Copy Output
          </button>

          <button onclick="downloadText()">
            Download TXT
          </button>

        </div>

        <!-- =========================
             Stats
        ========================== -->

        <div class="text-stats">

          <div class="stat-card">

            <span class="stat-title">
              Characters
            </span>

            <span
              class="stat-value"
              id="charCount"
            >
              0
            </span>

          </div>

          <div class="stat-card">

            <span class="stat-title">
              Words
            </span>

            <span
              class="stat-value"
              id="wordCount"
            >
              0
            </span>

          </div>

          <div class="stat-card">

            <span class="stat-title">
              Lines
            </span>

            <span
              class="stat-value"
              id="lineCount"
            >
              0
            </span>

          </div>

        </div>

      </section>

    </main>

    <!-- Right Ad -->

    <aside class="ad-space">

      <div class="ad-box">
        AD SPACE

    </p>

  </footer>

  <!-- =========================
       Script
  ========================== -->

  <script>

    const inputText =
      document.getElementById("inputText");

    const outputText =
      document.getElementById("outputText");

    function getInput() {
      return inputText.value;
    }

    function setOutput(text) {

      outputText.value = text;

      updateStats(text);

    }

    function convertUppercase() {

      setOutput(
        getInput().toUpperCase()
      );

    }

    function convertLowercase() {

      setOutput(
        getInput().toLowerCase()
      );

    }

    function convertCapitalize() {

      const text =
        getInput()
        .toLowerCase()
        .split(" ")
        .map(word =>
          word.charAt(0).toUpperCase() +
          word.slice(1)
        )
        .join(" ");

      setOutput(text);

    }

    function convertSentenceCase() {

      const text =
        getInput()
        .toLowerCase()
        .replace(
          /(^\s*\w|[.!?]\s*\w)/g,
          c => c.toUpperCase()
        );

      setOutput(text);

    }

    function convertAlternating() {

      let result = "";

      const text = getInput();

      for (let i = 0; i < text.length; i++) {

        result +=
          i % 2 === 0
          ? text[i].toLowerCase()
          : text[i].toUpperCase();

      }

      setOutput(result);

    }

    function removeExtraSpaces() {

      const text =
        getInput()
        .replace(/\s+/g, " ")
        .trim();

      setOutput(text);

    }

    function reverseText() {

      const text =
        getInput()
        .split("")
        .reverse()
        .join("");

      setOutput(text);

    }

    function clearText() {

      inputText.value = "";
      outputText.value = "";

      updateStats("");

    }

    async function copyOutput() {

      try {

        await navigator.clipboard.writeText(
          outputText.value
        );

        alert("Copied!");

      } catch {

        alert("Copy failed.");

      }

    }

    function downloadText() {

      const blob =
        new Blob(
          [outputText.value],
          { type: "text/plain" }
        );

      const url =
        URL.createObjectURL(blob);

      const a =
        document.createElement("a");

      a.href = url;

      a.download = "text-case-output.txt";

      a.click();

      URL.revokeObjectURL(url);

    }

    function updateStats(text) {

      document.getElementById("charCount")
        .textContent = text.length;

      const words =
        text.trim() === ""
        ? 0
        : text.trim().split(/\s+/).length;

      document.getElementById("wordCount")
        .textContent = words;

      document.getElementById("lineCount")
        .textContent =
          text === ""
          ? 0
          : text.split("\n").length;

    }

    inputText.addEventListener("input", () => {

      updateStats(inputText.value);

    });

  </script>

</body>
</html>

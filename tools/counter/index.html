<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Character Counter</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .container{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      width:350px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    textarea{
      width:100%;
      height:120px;
      padding:10px;
      font-size:16px;
      border:1px solid #ccc;
      border-radius:8px;
      resize:none;
      box-sizing:border-box;
    }

    .counter{
      margin-top:10px;
      text-align:right;
      font-size:18px;
      font-weight:bold;
      color:#333;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Character Counter</h1>

    <textarea id="textInput" placeholder="文字を入力してください"></textarea>

    <div class="counter">
      文字数: <span id="count">0</span>
    </div>
  </div>

  <script>
    const textInput = document.getElementById("textInput");
    const count = document.getElementById("count");

    textInput.addEventListener("input", () => {
      count.textContent = textInput.value.length;
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高機能タイマー</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Segoe UI,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:700px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter:blur(10px);
      border-radius:25px;
      padding:30px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      font-size:2.3rem;
    }

    .time-inputs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:15px;
      margin-bottom:25px;
    }

    .input-box{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .input-box label{
      color:#cbd5e1;
      font-size:0.95rem;
    }

    .input-box input{
      padding:14px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.1);
      color:white;
      font-size:1.2rem;
      text-align:center;
      outline:none;
    }

    .input-box input:focus{
      border:2px solid #38bdf8;
    }

    .display{
      text-align:center;
      margin:30px 0;
    }

    .timer{
      font-size:5rem;
      font-weight:bold;
      letter-spacing:3px;
    }

    .status{
      margin-top:10px;
      color:#94a3b8;
    }

    .progress-container{
      width:100%;
      height:18px;
      background:rgba(255,255,255,0.1);
      border-radius:999px;
      overflow:hidden;
      margin-bottom:30px;
    }

    .progress-bar{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#22c55e,#38bdf8);
      transition:width 0.2s linear;
    }

    .buttons{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
      margin-bottom:25px;
    }

    button{
      padding:14px 20px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-size:1rem;
      font-weight:bold;
      transition:0.2s;
      color:white;
    }

    button:hover{
      transform:translateY(-2px);
      opacity:0.9;
    }

    .start{background:#22c55e;}
    .pause{background:#f59e0b;}
    .reset{background:#ef4444;}
    .save{background:#3b82f6;}
    .fullscreen{background:#8b5cf6;}
    .home{background:#14b8a6;}

    .presets{
      margin-top:20px;
      background:rgba(255,255,255,0.05);
      border-radius:16px;
      padding:15px;
      max-height:220px;
      overflow-y:auto;
    }

    .preset-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .preset-item:last-child{
      border-bottom:none;
    }

    .preset-item button{
      padding:8px 12px;
      font-size:0.9rem;
      background:#0ea5e9;
    }

    .footer{
      margin-top:25px;
      text-align:center;
      color:#94a3b8;
      font-size:0.9rem;
    }

    @media(max-width:600px){

      .time-inputs{
        grid-template-columns:1fr;
      }

      .timer{
        font-size:3rem;
      }

      button{
        width:100%;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>⏳ 高機能タイマー</h1>

  <div class="time-inputs">

    <div class="input-box">
      <label>時間</label>
      <input type="number" id="hours" min="0" value="0">
    </div>

    <div class="input-box">
      <label>分</label>
      <input type="number" id="minutes" min="0" max="59" value="1">
    </div>

    <div class="input-box">
      <label>秒</label>
      <input type="number" id="seconds" min="0" max="59" value="0">
    </div>

  </div>

  <div class="display">
    <div class="timer" id="timerDisplay">00:01:00</div>
    <div class="status" id="status">待機中</div>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="buttons">

    <button class="start" onclick="startTimer()">▶ 開始</button>

    <button class="pause" onclick="pauseTimer()">⏸ 一時停止</button>

    <button class="reset" onclick="resetTimer()">🔄 リセット</button>

    <button class="save" onclick="savePreset()">💾 保存</button>

    <button class="fullscreen" onclick="toggleFullscreen()">🖥 全画面</button>

    <!-- ホーム画面へ戻る -->
    <button class="index.html" onclick="goHome()">🏠 ホームへ戻る</button>

  </div>

  <div class="presets">
    <h2 style="margin-bottom:10px;">📌 保存プリセット</h2>

    <div id="presetContainer"></div>
  </div>

  <div class="footer">
    HTML + CSS + JavaScript のみ使用
  </div>

</div>

<script>

let totalSeconds = 60;
let remainingSeconds = totalSeconds;

let timerInterval = null;
let running = false;

const timerDisplay = document.getElementById("timerDisplay");
const progressBar = document.getElementById("progressBar");
const statusText = document.getElementById("status");
const presetContainer = document.getElementById("presetContainer");

function formatTime(seconds){

  const hrs = Math.floor(seconds / 3600);
  const mins = Math.floor((seconds % 3600) / 60);
  const secs = seconds % 60;

  return `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
}

function updateDisplay(){

  timerDisplay.textContent = formatTime(remainingSeconds);

  const progress =
    ((totalSeconds - remainingSeconds) / totalSeconds) * 100;

  progressBar.style.width = `${progress}%`;

  document.title =
    `${formatTime(remainingSeconds)} - タイマー`;
}

function loadInputTime(){

  const hrs =
    parseInt(document.getElementById("hours").value) || 0;

  const mins =
    parseInt(document.getElementById("minutes").value) || 0;

  const secs =
    parseInt(document.getElementById("seconds").value) || 0;

  totalSeconds = hrs * 3600 + mins * 60 + secs;

  if(totalSeconds <= 0){

    alert("1秒以上を設定してください");
    return false;
  }

  remainingSeconds = totalSeconds;

  updateDisplay();

  return true;
}

function startTimer(){

  if(running) return;

  if(remainingSeconds === totalSeconds){

    const valid = loadInputTime();

    if(!valid) return;
  }

  running = true;

  statusText.textContent = "タイマー実行中";

  timerInterval = setInterval(()=>{

    remainingSeconds--;

    updateDisplay();

    if(remainingSeconds <= 0){

      clearInterval(timerInterval);

      running = false;

      remainingSeconds = 0;

      updateDisplay();

      progressBar.style.width = "100%";

      statusText.textContent = "タイマー終了！";

      alert("⏰ タイマー終了！");
    }

  },1000);
}

function pauseTimer(){

  clearInterval(timerInterval);

  running = false;

  statusText.textContent = "一時停止中";
}

function resetTimer(){

  clearInterval(timerInterval);

  running = false;

  loadInputTime();

  progressBar.style.width = "0%";

  statusText.textContent = "リセットしました";
}

function savePreset(){

  const preset = formatTime(totalSeconds);

  const item = document.createElement("div");

  item.className = "preset-item";

  item.innerHTML = `
    <span>${preset}</span>
    <button onclick="loadPreset('${preset}')">
      読み込み
    </button>
  `;

  presetContainer.prepend(item);
}

function loadPreset(time){

  const parts = time.split(":");

  document.getElementById("hours").value =
    parseInt(parts[0]);

  document.getElementById("minutes").value =
    parseInt(parts[1]);

  document.getElementById("seconds").value =
    parseInt(parts[2]);

  resetTimer();
}

function toggleFullscreen(){

  if(!document.fullscreenElement){

    document.documentElement.requestFullscreen();

  }else{

    document.exitFullscreen();
  }
}

function goHome(){

  window.location.href = "home.html";
}

document.querySelectorAll("input").forEach(input=>{

  input.addEventListener("input",()=>{

    loadInputTime();
  });
});

updateDisplay();

</script>

</body>
</html>

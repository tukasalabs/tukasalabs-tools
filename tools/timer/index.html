<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch & Timer</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #2a2a72, transparent 35%),
        radial-gradient(circle at bottom right, #009ffd, transparent 35%),
        linear-gradient(135deg, #0f172a, #111827);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 2.5rem;
      letter-spacing: 1px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .tab {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.25s;
    }

    .tab.active {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      transform: scale(1.02);
      font-weight: bold;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .time-display {
      text-align: center;
      font-size: 5rem;
      font-weight: bold;
      margin: 30px 0;
      letter-spacing: 3px;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 24px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .start {
      background: #22c55e;
      color: white;
    }

    .pause {
      background: #f59e0b;
      color: white;
    }

    .reset {
      background: #ef4444;
      color: white;
    }

    .lap {
      background: #3b82f6;
      color: white;
    }

    .laps {
      margin-top: 25px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .lap-item {
      background: rgba(255,255,255,0.08);
      padding: 12px 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    .timer-inputs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .timer-inputs input {
      width: 100px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      text-align: center;
      font-size: 1.2rem;
    }

    .timer-inputs input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .footer {
      margin-top: 35px;
      text-align: center;
      opacity: 0.7;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .time-display {
        font-size: 3rem;
      }

      .container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>⏱ Stopwatch & Timer</h1>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('stopwatch')">
        ストップウォッチ
      </button>

      <button class="tab" onclick="switchTab('timer')">
        タイマー
      </button>
    </div>

    <!-- Stopwatch -->
    <div id="stopwatch" class="panel active">

      <div class="time-display" id="stopwatchDisplay">
        00:00:00
      </div>

      <div class="controls">
        <button class="start" onclick="startStopwatch()">Start</button>
        <button class="pause" onclick="pauseStopwatch()">Pause</button>
        <button class="lap" onclick="lapTime()">Lap</button>
        <button class="reset" onclick="resetStopwatch()">Reset</button>
      </div>

      <div class="laps" id="laps"></div>

    </div>

    <!-- Timer -->
    <div id="timer" class="panel">

      <div class="timer-inputs">
        <input type="number" id="minutes" placeholder="分" min="0">
        <input type="number" id="seconds" placeholder="秒" min="0" max="59">
      </div>

      <div class="time-display" id="timerDisplay">
        00:00
      </div>

      <div class="controls">
        <button class="start" onclick="startTimer()">Start</button>
        <button class="pause" onclick="pauseTimer()">Pause</button>
        <button class="reset" onclick="resetTimer()">Reset</button>
      </div>

    </div>

    <div class="footer">
      Made with HTML / CSS / JavaScript
    </div>

  </div>

  <script>
    // =========================
    // TAB
    // =========================

    function switchTab(tabId) {
      document.querySelectorAll(".panel").forEach(panel => {
        panel.classList.remove("active");
      });

      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.remove("active");
      });

      document.getElementById(tabId).classList.add("active");

      event.target.classList.add("active");
    }

    // =========================
    // STOPWATCH
    // =========================

    let stopwatchTime = 0;
    let stopwatchInterval = null;
    let lapCount = 1;

    function formatStopwatch(ms) {
      let totalSeconds = Math.floor(ms / 1000);

      let minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      let seconds = String(totalSeconds % 60).padStart(2, "0");
      let centiseconds = String(Math.floor((ms % 1000) / 10)).padStart(2, "0");

      return `${minutes}:${seconds}:${centiseconds}`;
    }

    function updateStopwatch() {
      document.getElementById("stopwatchDisplay").textContent =
        formatStopwatch(stopwatchTime);
    }

    function startStopwatch() {
      if (stopwatchInterval) return;

      let lastTime = Date.now();

      stopwatchInterval = setInterval(() => {
        const now = Date.now();
        stopwatchTime += now - lastTime;
        lastTime = now;

        updateStopwatch();
      }, 10);
    }

    function pauseStopwatch() {
      clearInterval(stopwatchInterval);
      stopwatchInterval = null;
    }

    function resetStopwatch() {
      pauseStopwatch();
      stopwatchTime = 0;
      lapCount = 1;

      updateStopwatch();

      document.getElementById("laps").innerHTML = "";
    }

    function lapTime() {
      if (stopwatchTime === 0) return;

      const laps = document.getElementById("laps");

      const div = document.createElement("div");
      div.className = "lap-item";

      div.innerHTML = `
        <span>Lap ${lapCount}</span>
        <span>${formatStopwatch(stopwatchTime)}</span>
      `;

      laps.prepend(div);

      lapCount++;
    }

    // =========================
    // TIMER
    // =========================

    let timerInterval = null;
    let timerRemaining = 0;

    function formatTimer(seconds) {
      let mins = String(Math.floor(seconds / 60)).padStart(2, "0");
      let secs = String(seconds % 60).padStart(2, "0");

      return `${mins}:${secs}`;
    }

    function updateTimerDisplay() {
      document.getElementById("timerDisplay").textContent =
        formatTimer(timerRemaining);
    }

    function startTimer() {

      if (timerInterval) return;

      if (timerRemaining <= 0) {
        const mins = parseInt(document.getElementById("minutes").value) || 0;
        const secs = parseInt(document.getElementById("seconds").value) || 0;

        timerRemaining = mins * 60 + secs;

        if (timerRemaining <= 0) return;
      }

      updateTimerDisplay();

      timerInterval = setInterval(() => {

        timerRemaining--;

        updateTimerDisplay();

        if (timerRemaining <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;

          alert("⏰ タイマー終了！");
        }

      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function resetTimer() {
      pauseTimer();

      timerRemaining = 0;

      updateTimerDisplay();

      document.getElementById("minutes").value = "";
      document.getElementById("seconds").value = "";
    }

    updateStopwatch();
    updateTimerDisplay();
  </script>

</body>
</html>
